# Déploie la landing page (site/) sur GitHub Pages.
# Prérequis (fait) : Settings → Pages → Source = GitHub Actions.
name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Upload du site statique
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Déploiement Pages
        id: deployment
        uses: actions/deploy-pages@v5
