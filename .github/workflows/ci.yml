name: CI web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/ci.yml'

# Lecture seule : la CI ne pousse rien.
permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
